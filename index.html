<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#e0f5e4" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="템 캘린더" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="format-detection" content="telephone=no" />
  <title>템 캘린더</title>
  <link rel="icon" href="./icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./icon.svg" />
  <link rel="stylesheet" href="./styles.css" />
  <link rel="manifest" href="./manifest.json" />
</head>
<body>
  <div class="app-shell">
    <header class="top-bar">
      <div>
        <h1 id="selectedDateLabel">Today</h1>
      </div>
    </header>

    <main class="content">
      <section class="card today-card">
        <div id="selectedDateItems" class="today-items"></div>
      </section>

      <section class="calendar-card">
        <div class="calendar-header">
          <button class="month-nav" id="prevMonthBtn" type="button" aria-label="이전 달">‹</button>
          <h2 id="calendarMonthLabel">Month</h2>
          <button class="month-nav" id="nextMonthBtn" type="button" aria-label="다음 달">›</button>
        </div>
        <div id="calendarGrid" class="calendar-grid"></div>
      </section>
    </main>

    <footer class="bottom-bar">
      <button class="bottom-btn" id="openAddBtn">추가</button>
      <button class="bottom-btn" id="manageBtn">수정/삭제</button>
      <button class="bottom-btn" id="recordBtn">record</button>
    </footer>
  </div>

  <div class="sheet-backdrop hidden" id="itemSheetBackdrop">
    <div class="sheet">
      <div class="sheet-header">
        <div>
          <p class="eyebrow" id="sheetModeLabel">관리템 추가</p>
          <h3>템 정보</h3>
        </div>
        <button class="icon-btn" id="closeSheetBtn" aria-label="닫기">×</button>
      </div>
      <form id="itemForm" class="form">
        <input type="hidden" id="itemId" />
        <label>
          이름
          <input id="nameInput" type="text" placeholder="예: 영양제" required />
        </label>
        <div class="grid-two">
          <label>
            사용 시작일
            <input id="startInput" type="date" required />
          </label>
          <label>
            종료일
            <input id="endInput" type="date" required />
          </label>
        </div>
        <label>
          사용 주기(일)
          <input id="intervalInput" type="number" min="1" step="1" placeholder="예: 2" required />
        </label>
        <label>
          메모
          <textarea id="memoInput" rows="4" placeholder="짧게 적기"></textarea>
        </label>
        <div class="sheet-actions">
          <button type="button" class="ghost-btn" id="cancelBtn">취소</button>
          <button type="submit" class="primary-btn">저장</button>
        </div>
      </form>
    </div>
  </div>

  <div class="sheet-backdrop hidden" id="manageSheetBackdrop">
    <div class="sheet manage-sheet">
      <div class="sheet-header">
        <div>
          <p class="eyebrow">수정/삭제</p>
          <h3>관리템 목록</h3>
        </div>
        <button class="icon-btn" id="closeManageBtn" aria-label="닫기">×</button>
      </div>
      <div id="manageList" class="manage-list"></div>
    </div>
  </div>

  <div class="sheet-backdrop hidden" id="recordSheetBackdrop">
    <div class="sheet record-sheet">
      <div class="sheet-header">
        <div>
          <p class="eyebrow">record</p>
          <h3 id="recordTitle">기록</h3>
        </div>
        <div class="record-header-actions">
          <button class="ghost-btn record-back hidden" id="recordBackBtn" type="button">목록</button>
          <button class="icon-btn" id="closeRecordBtn" aria-label="닫기">×</button>
        </div>
      </div>

      <div id="recordListView" class="record-view">
        <p class="helper-text">쓸템을 눌러 날짜별 사진 기록을 확인해보세요.</p>
        <div id="recordItemList" class="record-item-list"></div>
      </div>

      <div id="recordDetailView" class="record-view hidden">
        <div class="record-detail-head">
          <h4 id="recordItemTitle"></h4>
          <p id="recordItemMeta"></p>
        </div>
        <form id="recordForm" class="record-form">
          <label>
            날짜
            <input id="recordDateInput" type="date" required />
          </label>
          <div class="record-actions">
            <input id="recordFilesInput" type="file" accept="image/*" multiple hidden />
            <input id="recordCameraInput" type="file" accept="image/*" capture="environment" hidden />
            <button type="button" class="ghost-btn" id="pickPhotosBtn">사진 추가</button>
            <button type="button" class="ghost-btn" id="takePhotoBtn">카메라</button>
          </div>
          <button type="submit" class="primary-btn">기록 저장</button>
        </form>
        <div id="recordGallery" class="record-gallery"></div>
      </div>
    </div>
  </div>

  <template id="selectedItemTemplate">
    <article class="today-item">
      <div class="today-meta">
        <h4></h4>
        <p></p>
      </div>
      <button class="check-btn" type="button" aria-label="체크"></button>
    </article>
  </template>

  <script src="./app.js"></script>
</body>
</html>
